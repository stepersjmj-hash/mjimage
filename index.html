<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJ Image — 화장품 설정샷 생성기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    header p { margin-top: 8px; font-size: 13px; color: #888; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      margin-bottom: 20px;
    }
    .card > label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    /* API Key */
    .api-row { display: flex; gap: 8px; }
    .api-row input {
      flex: 1;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
      font-family: monospace;
      background: #fafafa;
    }
    .api-row input:focus { border-color: #aaa; background: #fff; }
    .api-row button {
      border: none;
      background: #1a1a1a;
      color: #fff;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .api-row button:hover { opacity: .8; }

    /* Model */
    #model-section { margin-top: 16px; }
    #check-models-btn {
      width: 100%; padding: 10px;
      background: #f0f0ee; color: #555;
      border: none; border-radius: 10px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    #check-models-btn:hover { background: #e6e6e2; }
    #model-list {
      margin-top: 10px; max-height: 200px; overflow-y: auto;
      font-size: 12px; background: #fafafa;
      border: 1.5px solid #e5e5e5; border-radius: 10px;
      padding: 10px 12px; display: none;
    }
    #model-list .model-item {
      padding: 6px 0; border-bottom: 1px solid #f0f0ee;
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    #model-list .model-item:last-child { border-bottom: none; }
    #model-list .model-item:hover { color: #000; }
    #model-list .model-id { font-family: monospace; color: #333; }
    #model-list .select-tag {
      margin-left: auto; font-size: 11px; color: #888;
      background: #eee; padding: 2px 7px; border-radius: 6px;
    }
    #current-model { margin-top: 10px; font-size: 12px; color: #888; }
    #current-model span { font-family: monospace; color: #333; font-weight: 600; }

    /* Common prompt */
    .common-prompt-area {
      width: 100%;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      outline: none;
      background: #fafafa;
      color: #333;
      transition: border-color .2s;
      line-height: 1.5;
    }
    .common-prompt-area:focus { border-color: #aaa; background: #fff; }

    /* Prompt list */
    .prompt-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .prompt-list-header > label { margin-bottom: 0; }
    .select-all-btn {
      font-size: 11px; color: #888;
      background: none; border: none;
      cursor: pointer; padding: 2px 6px;
      border-radius: 6px;
      transition: background .15s;
    }
    .select-all-btn:hover { background: #f0f0ee; color: #333; }

    #prompt-list { display: flex; flex-direction: column; gap: 8px; }

    .prompt-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      background: #fafafa;
      transition: border-color .2s;
    }
    .prompt-item:has(.prompt-cb:checked) { border-color: #c8c8c8; background: #fff; }

    .prompt-cb {
      margin-top: 2px;
      width: 16px; height: 16px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: #1a1a1a;
    }

    .prompt-text {
      flex: 1;
      font-size: 12px;
      color: #333;
      line-height: 1.5;
      word-break: break-all;
      cursor: pointer;
    }
    .prompt-title {
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a;
      cursor: pointer;
    }
    .prompt-title:hover { opacity: .6; }
    .prompt-text.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .prompt-edit-area {
      flex: 1;
      border: 1.5px solid #aaa;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      outline: none;
      background: #fff;
      line-height: 1.5;
    }

    .prompt-thumb {
      width: 44px; height: 44px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      cursor: zoom-in;
      border: 1.5px solid #e5e5e5;
      transition: opacity .15s;
    }
    .prompt-thumb:hover { opacity: .75; }
    .prompt-thumb-empty {
      width: 44px; height: 44px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1.5px dashed #ccc;
      background: #f7f7f5;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: 18px;
      color: #ccc;
    }
    .prompt-thumb-empty:hover { border-color: #999; background: #f0f0ee; color: #999; }

    /* 라이트박스 */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.82);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 92vh;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    #lightbox-close {
      position: absolute; top: 18px; right: 22px;
      color: #fff; font-size: 28px; cursor: pointer;
      line-height: 1; opacity: .8;
    }
    #lightbox-close:hover { opacity: 1; }

    .prompt-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }
    .prompt-actions button {
      border: none;
      background: #f0f0ee;
      color: #555;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .prompt-actions button:hover { background: #e0e0dc; }
    .prompt-actions button.del { color: #e04040; }
    .prompt-actions button.del:hover { background: #ffe5e5; }
    .prompt-actions button.save { color: #1a1a1a; font-weight: 600; }

    /* Edit fields wrapper */
    .prompt-edit-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .prompt-edit-title {
      border: 1.5px solid #aaa;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: #fff;
    }
    .prompt-edit-title:focus { border-color: #1a1a1a; }

    /* Add prompt */
    .add-prompt-area {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .add-prompt-area input[type="text"] {
      width: 100%;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: #fafafa;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .add-prompt-area input[type="text"]:focus { border-color: #aaa; background: #fff; }
    .add-prompt-area textarea {
      width: 100%;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 72px;
      outline: none;
      background: #fafafa;
      transition: border-color .2s;
      line-height: 1.5;
    }
    .add-prompt-area textarea:focus { border-color: #aaa; background: #fff; }
    .add-prompt-area button {
      align-self: flex-end;
      border: none;
      background: #1a1a1a;
      color: #fff;
      border-radius: 10px;
      padding: 9px 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .add-prompt-area button:hover { opacity: .8; }

    /* Drop zone */
    .dropzone {
      border: 2px dashed #ddd; border-radius: 14px;
      padding: 40px 20px; text-align: center;
      cursor: pointer; transition: border-color .2s, background .2s;
      position: relative;
    }
    .dropzone:hover, .dropzone.drag-over { border-color: #aaa; background: #fafafa; }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone .icon { font-size: 32px; margin-bottom: 10px; }
    .dropzone .hint { font-size: 13px; color: #999; line-height: 1.6; }
    .dropzone .hint strong { color: #555; font-weight: 600; }

    #preview-wrap { display: none; margin-top: 16px; position: relative; }
    #preview-wrap img { width: 100%; border-radius: 12px; display: block; }
    #preview-wrap button.remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.55); color: #fff;
      border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* Generate button */
    #generate-btn {
      width: 100%; max-width: 480px;
      padding: 16px; background: #1a1a1a; color: #fff;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
      margin-bottom: 20px;
    }
    #generate-btn:disabled { opacity: .4; cursor: not-allowed; }
    #generate-btn:not(:disabled):hover { opacity: .85; }

    /* Status */
    #status {
      font-size: 13px; color: #888;
      text-align: center; min-height: 20px; margin-bottom: 24px;
    }
    #status.error { color: #e04040; }

    /* Result */
    #result-wrap { display: none; width: 100%; max-width: 480px; }
    #result-wrap h2 {
      font-size: 13px; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 16px; text-align: center;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .result-grid.single { grid-template-columns: 1fr; }
    .result-item { display: flex; flex-direction: column; gap: 8px; }
    .result-item img {
      width: 100%; border-radius: 12px; display: block;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    .result-item .prompt-label {
      font-size: 11px; color: #888; text-align: center; line-height: 1.4;
    }
    .result-item .dl-btn {
      padding: 10px; background: #f0f0ee; color: #1a1a1a;
      border: none; border-radius: 10px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .2s; text-align: center;
    }
    .result-item .dl-btn:hover { background: #e6e6e2; }
    .result-item .generating {
      display: flex; align-items: center; justify-content: center;
      height: 180px; background: #f7f7f5;
      border-radius: 12px; font-size: 12px; color: #aaa;
    }
    .result-item .gen-error {
      display: flex; align-items: center; justify-content: center;
      height: 180px; background: #fff5f5;
      border-radius: 12px; font-size: 11px; color: #e04040;
      padding: 12px; text-align: center;
    }

    /* Spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #ccc; border-top-color: #555;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>화장품 설정샷 생성기</h1>
    <p>제품 이미지를 업로드하면 클린한 연출 이미지를 만들어드려요</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <label>Google AI Studio API Key</label>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="AIza..." autocomplete="off" />
      <button onclick="saveKey()">저장</button>
    </div>
  </div>

  <!-- Model selector -->
  <div class="card">
    <label>모델 선택</label>
    <div id="current-model">현재 모델: <span id="current-model-name">gemini-2.5-flash-image</span></div>
    <div id="model-section">
      <button id="check-models-btn" onclick="loadModels()" style="margin-top:10px">사용 가능한 모델 목록 불러오기</button>
      <div id="model-list"></div>
    </div>
  </div>

  <!-- Prompt manager -->
  <div class="card">
    <label>공통 프롬프트</label>
    <textarea id="common-prompt" class="common-prompt-area" placeholder="모든 프롬프트에 공통 적용되는 내용을 입력하세요"></textarea>

    <div class="prompt-list-header" style="margin-top:20px">
      <label style="margin-bottom:0">프롬프트 목록</label>
      <button class="select-all-btn" onclick="toggleSelectAll()">전체 선택/해제</button>
    </div>
    <div id="prompt-list"></div>

    <div class="add-prompt-area">
      <input type="text" id="new-prompt-title" placeholder="제목 (선택)" />
      <textarea id="new-prompt-input" placeholder="새 프롬프트를 입력하세요..."></textarea>
      <button onclick="addPrompt()">추가</button>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <label>화장품 이미지 업로드</label>
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept="image/*" />
      <div class="icon">📷</div>
      <div class="hint">
        <strong>클릭하거나 드래그</strong>해서 이미지를 올려주세요<br/>
        JPG, PNG, WEBP 지원
      </div>
    </div>
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="미리보기" />
      <button class="remove" onclick="removeImage()">✕</button>
    </div>
  </div>

  <button id="generate-btn" disabled onclick="generate()">설정샷 생성하기</button>

  <div id="status"></div>

  <!-- 썸네일 업로드용 숨김 input -->
  <input type="file" id="thumb-file-input" accept="image/*" style="display:none" />

  <!-- 라이트박스 -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
  </div>

  <!-- Result -->
  <div id="result-wrap">
    <h2>생성된 설정샷</h2>
    <div class="result-grid" id="result-grid"></div>
  </div>

<script>
  // ── 기본 데이터 ──────────────────────────────────────────
  const DEFAULT_COMMON = "1:1비율 이미지로 한국 화장품 연출 이미지 제작, 제품 이미지는 최대한 손상없이, 결과 이미지는 가로/세로 비율 1:1로 잘라줘";

  const DEFAULT_PROMPTS_TEXT = [
    { title: "욕실 배경", img: "img/1.png", text: "A high-resolution, square-aspect (1:1 ratio) professional photograph for a Shopee listing, designed to showcase a user-provided cosmetic product in a pristine, luxury environment. The focus is entirely on the environmental context and context-enhancing props. The central element is a minimalist product packaging (whose specific features and descriptions are omitted) standing at the center of a refined Carrara marble counter. Sparingly and elegantly arranged around the product are context-enhancing props: a crystal-clear glass vanity tray to the left; a single, flawless monstera leaf resting on the marble surface to the right; and a neat stack of rolled, fluffy white cotton towels slightly further back. There is no formulation or foam visible outside the packaging. The background is a gently blurred, pristine bathroom or vanity interior with white subway tiles and a large mirror, creating depth and a sense of luxury. Soft, diffused natural daylight illuminates the scene from a side window, highlighting the textures of the marble, leaf, and towels. The overall aesthetic is one of clean, serene luxury." },
    { title: "세럼 대리석", img: "img/2.png", text: "A delicate female hand gently holding a luxury skincare serum bottle, resting on a clean white marble surface, pristine and minimal, soft morning sunlight, natural shadow, product showcase, clean aesthetic, empty space, 85mm lens, masterpiece, ultra-detailed" },
    { title: "유리 항아리", img: "img/3.png", text: "A premium cosmetic glass jar with a sleek minimalist design, placed on an exposed textured grey marble surface. Clean neutral background, soft studio lighting with gentle highlights, sophisticated, elegant, modern luxury skincare vibe, commercial macro photography, hyper-detailed, 8k, --ar 1:1 --style raw --v 6.0" },
    { title: "미니멀 스킨케어", img: "img/4.png", text: "A minimalist cosmetic skincare bottle with a blank white label, resting on a clean white marble block with subtle grey veins. Soft natural sunlight filtering through a window, creating elegant and soft shadows. Bright and airy atmosphere, simple, luxurious, high-end commercial product photography, empty space for text, photorealistic, 8k, --ar 1:1 --style raw --v 6.0" },
    { title: "허브 잎", img: "img/5.png", text: "Create a natural and soothing skincare scene using the provided product image. Place the product on a clean surface with soft natural elements like leaves, herbs, or water. Use warm natural lighting and a calm, minimal background. Emphasize gentle, safe, and dermatological skincare feeling."},
  ];

  // ── 상태 ─────────────────────────────────────────────────
  let promptList = [];  // { id, title?, text, checked }
  let nextId = 1;
  let uploadedFile = null;
  let currentModel = 'gemini-2.5-flash-image';
  const resultImages = new Map(); // slot index → data URL

  // ── 프롬프트 저장/불러오기 ────────────────────────────────
  const PROMPTS_VERSION = 2; // title 필드 도입 버전

  function savePrompts() {
    localStorage.setItem('mj_prompts', JSON.stringify({ v: PROMPTS_VERSION, list: promptList, nextId }));
    localStorage.setItem('mj_common_prompt', document.getElementById('common-prompt').value);
  }

  function loadPrompts() {
    const saved = localStorage.getItem('mj_prompts');
    if (saved) {
      const data = JSON.parse(saved);
      // 구버전(v1)도 title: '' 붙여서 마이그레이션, 데이터 버리지 않음
      promptList = data.list.map(p => ({ title: '', img: '', ...p }));
      nextId = data.nextId;
      // DEFAULT_PROMPTS_TEXT에 새 항목 추가되거나 img 필드 추가되면 자동 반영
      let added = false;
      DEFAULT_PROMPTS_TEXT.forEach(def => {
        const existing = promptList.find(p => p.text === def.text);
        if (!existing) {
          promptList.push({ id: nextId++, title: def.title ?? '', img: def.img ?? '', text: def.text, checked: true });
          added = true;
        } else if (!existing.img && def.img) {
          existing.img = def.img;
          added = true;
        }
      });
      if (added) savePrompts();
    } else {
      promptList = DEFAULT_PROMPTS_TEXT.map((p, i) => ({ id: i + 1, title: p.title ?? '', text: p.text, checked: true }));
      nextId = DEFAULT_PROMPTS_TEXT.length + 1;
    }
    const savedCommon = localStorage.getItem('mj_common_prompt');
    document.getElementById('common-prompt').value = savedCommon ?? DEFAULT_COMMON;
  }

  // ── 프롬프트 목록 렌더링 ──────────────────────────────────
  function renderPromptList() {
    const el = document.getElementById('prompt-list');
    if (promptList.length === 0) {
      el.innerHTML = '<div style="font-size:12px;color:#aaa;text-align:center;padding:16px 0">프롬프트가 없습니다</div>';
      updateBtn();
      return;
    }
    el.innerHTML = promptList.map(p => `
      <div class="prompt-item" id="pi-${p.id}">
        <input type="checkbox" class="prompt-cb" ${p.checked ? 'checked' : ''}
          onchange="togglePrompt(${p.id})" />
        ${p.img
          ? `<img class="prompt-thumb" src="${escHtml(p.img)}" alt="" onclick="openLightbox('${escHtml(p.img)}')" />`
          : `<div class="prompt-thumb-empty" onclick="pickThumb(${p.id})" title="이미지 등록">+</div>`
        }
        <span class="prompt-text collapsed" onclick="toggleExpand(this)">${p.title ? `<b class="prompt-title" onclick="event.stopPropagation();togglePrompt(${p.id})">${escHtml(p.title)}</b><br>${escHtml(p.text)}` : escHtml(p.text)}</span>
        <div class="prompt-actions">
          <button onclick="startEdit(${p.id})">수정</button>
          <button class="del" onclick="deletePrompt(${p.id})">삭제</button>
        </div>
      </div>
    `).join('');
    updateBtn();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toggleExpand(el) {
    el.classList.toggle('collapsed');
  }

  // ── 프롬프트 조작 ─────────────────────────────────────────
  function togglePrompt(id) {
    const p = promptList.find(p => p.id === id);
    if (p) {
      p.checked = !p.checked;
      const cb = document.querySelector(`#pi-${id} .prompt-cb`);
      if (cb) cb.checked = p.checked;
    }
    savePrompts();
    updateBtn();
  }

  function toggleSelectAll() {
    const anyUnchecked = promptList.some(p => !p.checked);
    promptList.forEach(p => p.checked = anyUnchecked);
    savePrompts();
    renderPromptList();
  }

  function deletePrompt(id) {
    promptList = promptList.filter(p => p.id !== id);
    savePrompts();
    renderPromptList();
  }

  function addPrompt() {
    const titleInput = document.getElementById('new-prompt-title');
    const input = document.getElementById('new-prompt-input');
    const title = titleInput.value.trim();
    const text = input.value.trim();
    if (!text) return;
    promptList.push({ id: nextId++, title, text, checked: true });
    titleInput.value = '';
    input.value = '';
    savePrompts();
    renderPromptList();
  }

  function startEdit(id) {
    const p = promptList.find(p => p.id === id);
    if (!p) return;
    const item = document.getElementById(`pi-${id}`);
    item.innerHTML = `
      <input type="checkbox" class="prompt-cb" ${p.checked ? 'checked' : ''} disabled />
      <div class="prompt-edit-fields">
        <input type="text" class="prompt-edit-title" placeholder="제목 (선택)" value="${escHtml(p.title ?? '')}" />
        <textarea class="prompt-edit-area">${escHtml(p.text)}</textarea>
      </div>
      <div class="prompt-actions">
        <button class="save" onclick="saveEdit(${id})">저장</button>
        <button onclick="renderPromptList()">취소</button>
      </div>
    `;
  }

  function saveEdit(id) {
    const p = promptList.find(p => p.id === id);
    if (!p) return;
    const titleEl = document.querySelector(`#pi-${id} .prompt-edit-title`);
    const ta = document.querySelector(`#pi-${id} .prompt-edit-area`);
    const text = ta.value.trim();
    if (!text) return;
    p.title = titleEl ? titleEl.value.trim() : '';
    p.text = text;
    savePrompts();
    renderPromptList();
  }

  // Enter키로 프롬프트 추가
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('new-prompt-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) addPrompt();
    });

    // 공통 프롬프트 자동 저장
    document.getElementById('common-prompt').addEventListener('input', savePrompts);
  });

  // ── updateBtn ─────────────────────────────────────────────
  function updateBtn() {
    const hasKey = document.getElementById('api-key').value.trim().length > 0;
    const checkedCount = promptList.filter(p => p.checked).length;
    const btn = document.getElementById('generate-btn');
    const ok = hasKey && uploadedFile && checkedCount > 0;
    btn.disabled = !ok;
    btn.textContent = ok ? `설정샷 생성하기 (${checkedCount}장)` : '설정샷 생성하기';
  }

  // ── API Key ───────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('mj_api_key');
    if (saved) document.getElementById('api-key').value = saved;
    loadPrompts();
    renderPromptList();
    updateBtn();
  });

  function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    if (!key) return;
    localStorage.setItem('mj_api_key', key);
    setStatus('API 키가 저장되었습니다.');
    updateBtn();
  }

  document.getElementById('api-key').addEventListener('input', updateBtn);

  // ── Model ─────────────────────────────────────────────────
  async function loadModels() {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey) { setStatus('먼저 API 키를 입력해주세요.', true); return; }
    const btn = document.getElementById('check-models-btn');
    btn.textContent = '불러오는 중...'; btn.disabled = true;
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'API 오류');
      const allModels = (data.models || []).filter(m => {
        const id = m.name.replace('models/', '');
        return (m.supportedGenerationMethods || []).includes('generateContent') &&
               (id.includes('image') || id.includes('imagen'));
      });
      const listEl = document.getElementById('model-list');
      listEl.style.display = 'block';
      if (allModels.length === 0) {
        listEl.innerHTML = '<div style="color:#888;padding:8px 0">사용 가능한 이미지 생성 모델이 없습니다.</div>';
      } else {
        listEl.innerHTML = allModels.map(m => {
          const id = m.name.replace('models/', '');
          const displayName = m.displayName || '';
          return `<div class="model-item" onclick="selectModel('${id}')">
            <span class="model-id">${id}</span>
            ${displayName ? `<span style="font-size:11px;color:#888">(${displayName})</span>` : ''}
            <span class="select-tag" style="background:#e8f5e9;color:#2e7d32">이미지</span>
          </div>`;
        }).join('');
      }
    } catch(e) {
      setStatus('모델 목록 오류: ' + e.message, true);
    } finally {
      btn.textContent = '새로고침'; btn.disabled = false;
    }
  }

  function selectModel(modelId) {
    currentModel = modelId;
    document.getElementById('current-model-name').textContent = modelId;
    document.getElementById('model-list').style.display = 'none';
    document.getElementById('check-models-btn').textContent = '사용 가능한 모델 목록 불러오기';
    setStatus(`모델 선택됨: ${modelId}`);
  }

  // ── Upload ────────────────────────────────────────────────
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    uploadedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('preview-img').src = ev.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
      dz.style.display = 'none';
      updateBtn();
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    uploadedFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('preview-wrap').style.display = 'none';
    dz.style.display = 'block';
    updateBtn();
  }

  // ── Status ────────────────────────────────────────────────
  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = isError ? 'error' : '';
  }

  // ── Gemini API ────────────────────────────────────────────
  async function callGemini(apiKey, prompt, base64, mimeType) {
    const body = {
      contents: [{ parts: [
        { text: prompt },
        { inline_data: { mime_type: mimeType, data: base64 } }
      ]}],
      generationConfig: { responseModalities: ["IMAGE", "TEXT"] }
    };
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${apiKey}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const parts = data.candidates?.[0]?.content?.parts || [];
    const imgPart = parts.find(p =>
      p.inlineData?.mimeType?.startsWith('image/') ||
      p.inline_data?.mime_type?.startsWith('image/')
    );
    if (!imgPart) {
      const reason = data.candidates?.[0]?.finishReason || '';
      const textPart = parts.find(p => p.text);
      throw new Error(
        `이미지 없음` +
        (reason ? ` (${reason})` : '') +
        (textPart?.text ? `: ${textPart.text.slice(0, 100)}` : '')
      );
    }
    const inlineData = imgPart.inlineData || imgPart.inline_data;
    return `data:${inlineData.mimeType || inlineData.mime_type};base64,${inlineData.data}`;
  }

  // ── Generate ──────────────────────────────────────────────
  async function generate() {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey || !uploadedFile) return;

    const selected = promptList.filter(p => p.checked);
    if (selected.length === 0) return;

    const commonPrompt = document.getElementById('common-prompt').value.trim();
    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    resultImages.clear();

    const grid = document.getElementById('result-grid');
    grid.className = 'result-grid' + (selected.length === 1 ? ' single' : '');
    grid.innerHTML = selected.map((p, i) => `
      <div class="result-item" id="slot-${i}">
        <div class="generating"><span class="spinner"></span> 생성 중...</div>
        <div class="prompt-label">${escHtml(p.text.slice(0, 40))}${p.text.length > 40 ? '…' : ''}</div>
      </div>
    `).join('');
    document.getElementById('result-wrap').style.display = 'block';
    setStatus(`<span class="spinner"></span> 이미지 ${selected.length}장 생성 중...`);

    const base64 = await fileToBase64(uploadedFile);
    const mimeType = uploadedFile.type;

    let doneCount = 0;
    const results = await Promise.allSettled(
      selected.map((p, i) => {
        const fullPrompt = commonPrompt ? p.text + '\n' + commonPrompt : p.text;
        return callGemini(apiKey, fullPrompt, base64, mimeType)
          .then(imgSrc => {
            resultImages.set(i, imgSrc);
            document.getElementById(`slot-${i}`).innerHTML = `
              <img src="${imgSrc}" alt="결과 ${i+1}" onclick="openImageInNewTab(${i})" style="cursor:zoom-in" />
              <div class="prompt-label">${p.title ? escHtml(p.title) : (escHtml(p.text.slice(0, 40)) + (p.text.length > 40 ? '…' : ''))}</div>
              <button class="dl-btn" onclick="downloadImage(${i}, ${i+1})">다운로드</button>
            `;
            doneCount++;
            setStatus(`<span class="spinner"></span> ${doneCount} / ${selected.length} 완료...`);
          })
          .catch(err => {
            document.getElementById(`slot-${i}`).innerHTML = `
              <div class="gen-error">오류: ${escHtml(err.message)}</div>
              <div class="prompt-label">${p.title ? escHtml(p.title) : (escHtml(p.text.slice(0, 40)) + (p.text.length > 40 ? '…' : ''))}</div>
            `;
            doneCount++;
            setStatus(`<span class="spinner"></span> ${doneCount} / ${selected.length} 완료...`);
            throw err;
          });
      })
    );

    const successCount = results.filter(r => r.status === 'fulfilled').length;
    setStatus(
      successCount === selected.length
        ? `✓ ${successCount}장 모두 생성 완료!`
        : `✓ ${successCount}장 완료 (${selected.length - successCount}장 실패)`,
      successCount === 0
    );
    btn.disabled = false;
    updateBtn();
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function pickThumb(promptId) {
    const input = document.getElementById('thumb-file-input');
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const p = promptList.find(p => p.id === promptId);
        if (!p) return;
        p.img = ev.target.result;
        savePrompts();
        renderPromptList();
      };
      reader.readAsDataURL(file);
      input.value = '';
    };
    input.click();
  }

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  function openImageInNewTab(slotIndex) {
    const src = resultImages.get(slotIndex);
    if (!src) return;
    const [header, data] = src.split(',');
    const mime = header.match(/:(.*?);/)[1];
    const binary = atob(data);
    const arr = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
    const blob = new Blob([arr], { type: mime });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  }

  function downloadImage(slotIndex, label) {
    const src = resultImages.get(slotIndex);
    if (!src) return;
    const a = document.createElement('a');
    a.href = src;
    a.download = `mjimage_${label}_${Date.now()}.png`;
    a.click();
  }
</script>
</body>
