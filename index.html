<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJ Image — 화장품 설정샷 생성기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    header p {
      margin-top: 8px;
      font-size: 13px;
      color: #888;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      margin-bottom: 20px;
    }

    .card label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    /* API Key */
    .api-row {
      display: flex;
      gap: 8px;
    }
    .api-row input {
      flex: 1;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
      font-family: monospace;
      background: #fafafa;
    }
    .api-row input:focus { border-color: #aaa; background: #fff; }
    .api-row button {
      border: none;
      background: #1a1a1a;
      color: #fff;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .api-row button:hover { opacity: .8; }

    #model-section { margin-top: 16px; }
    #check-models-btn {
      width: 100%;
      padding: 10px;
      background: #f0f0ee;
      color: #555;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    #check-models-btn:hover { background: #e6e6e2; }
    #model-list {
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
      background: #fafafa;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 10px 12px;
      display: none;
    }
    #model-list .model-item {
      padding: 6px 0;
      border-bottom: 1px solid #f0f0ee;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    #model-list .model-item:last-child { border-bottom: none; }
    #model-list .model-item:hover { color: #000; }
    #model-list .model-id { font-family: monospace; color: #333; }
    #model-list .select-tag {
      margin-left: auto;
      font-size: 11px;
      color: #888;
      background: #eee;
      padding: 2px 7px;
      border-radius: 6px;
    }
    #current-model {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }
    #current-model span { font-family: monospace; color: #333; font-weight: 600; }

    /* Drop zone */
    .dropzone {
      border: 2px dashed #ddd;
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .dropzone:hover, .dropzone.drag-over {
      border-color: #aaa;
      background: #fafafa;
    }
    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .dropzone .icon { font-size: 32px; margin-bottom: 10px; }
    .dropzone .hint { font-size: 13px; color: #999; line-height: 1.6; }
    .dropzone .hint strong { color: #555; font-weight: 600; }

    #preview-wrap {
      display: none;
      margin-top: 16px;
      position: relative;
    }
    #preview-wrap img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }
    #preview-wrap button.remove {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* Generate button */
    #generate-btn {
      width: 100%;
      max-width: 480px;
      padding: 16px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      margin-bottom: 20px;
    }
    #generate-btn:disabled { opacity: .4; cursor: not-allowed; }
    #generate-btn:not(:disabled):hover { opacity: .85; }

    /* Status */
    #status {
      font-size: 13px;
      color: #888;
      text-align: center;
      min-height: 20px;
      margin-bottom: 24px;
    }
    #status.error { color: #e04040; }

    /* Result */
    #result-wrap {
      display: none;
      width: 100%;
      max-width: 480px;
    }
    #result-wrap h2 {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 16px;
      text-align: center;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .result-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-item img {
      width: 100%;
      border-radius: 12px;
      display: block;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    .result-item .prompt-label {
      font-size: 11px;
      color: #888;
      text-align: center;
      line-height: 1.4;
    }
    .result-item .dl-btn {
      padding: 10px;
      background: #f0f0ee;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      text-align: center;
    }
    .result-item .dl-btn:hover { background: #e6e6e2; }
    .result-item .generating {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 180px;
      background: #f7f7f5;
      border-radius: 12px;
      font-size: 12px;
      color: #aaa;
    }
    .result-item .gen-error {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 180px;
      background: #fff5f5;
      border-radius: 12px;
      font-size: 11px;
      color: #e04040;
      padding: 12px;
      text-align: center;
    }

    /* Group selector */
    .group-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .group-btn {
      padding: 12px 8px;
      background: #f0f0ee;
      color: #555;
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }
    .group-btn:hover { background: #e6e6e2; }
    .group-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>화장품 설정샷 생성기</h1>
    <p>제품 이미지를 업로드하면 클린한 연출 이미지를 만들어드려요</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <label>Google AI Studio API Key</label>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="AIza..." autocomplete="off" />
      <button onclick="saveKey()">저장</button>
    </div>
  </div>

  <!-- Model selector -->
  <div class="card">
    <label>모델 선택</label>
    <div id="current-model">현재 모델: <span id="current-model-name">gemini-2.5-flash-image</span></div>
    <div id="model-section">
      <button id="check-models-btn" onclick="loadModels()" style="margin-top:10px">사용 가능한 모델 목록 불러오기</button>
      <div id="model-list"></div>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <label>화장품 이미지 업로드</label>
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept="image/*" />
      <div class="icon">📷</div>
      <div class="hint">
        <strong>클릭하거나 드래그</strong>해서 이미지를 올려주세요<br/>
        JPG, PNG, WEBP 지원
      </div>
    </div>
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="미리보기" />
      <button class="remove" onclick="removeImage()">✕</button>
    </div>
  </div>

  <!-- Group selector -->
  <div class="card">
    <label>프롬프트 그룹 선택</label>
    <div class="group-selector" id="group-selector"></div>
  </div>

  <button id="generate-btn" disabled onclick="generate()">설정샷 생성하기</button>

  <div id="status"></div>

  <!-- Result -->
  <div id="result-wrap">
    <h2>생성된 설정샷</h2>
    <div class="result-grid" id="result-grid"></div>
  </div>

<script>
  // ✏️ 공통 프롬프트 — 모든 그룹/프롬프트에 기본 적용
  const COMMON_PROMPT = "1:1비율 이미지로 한국 화장품 연출 이미지 제작, 제품 이미지는 최대한 손상없이";

  // ✏️ 프롬프트 그룹 4개 (그룹당 프롬프트 4개)
  const PROMPT_GROUPS = [
    {
      name: "FACE",
      prompts: [
        "A graceful female hand holding a glass dropper over a clear skincare ampoule bottle, dropping clear liquid, minimalist aesthetic, clean white background, soft studio lighting, water reflection, macro product photography, high key lighting, simple and pure, highly detailed, 8k, photorealistic, (clean and simple:1.2)",
        "A delicate female hand gently holding a luxury skincare serum bottle, resting on a clean white marble surface, pristine and minimal, soft morning sunlight, natural shadow, product showcase, clean aesthetic, empty space, 85mm lens, masterpiece, ultra-detailed",
        "A premium cosmetic glass jar with a sleek minimalist design, placed on an exposed textured grey marble surface. Clean neutral background, soft studio lighting with gentle highlights, sophisticated, elegant, modern luxury skincare vibe, commercial macro photography, hyper-detailed, 8k, --ar 1:1 --style raw --v 6.0",
        "A minimalist cosmetic skincare bottle with a blank white label, resting on a clean white marble block with subtle grey veins. Soft natural sunlight filtering through a window, creating elegant and soft shadows. Bright and airy atmosphere, simple, luxurious, high-end commercial product photography, empty space for text, photorealistic, 8k, --ar 1:1 --style raw --v 6.0",
      ]
    },
    {
      name: "HAND",
      prompts: [
        "프롬프트 2-1",
        "프롬프트 2-2",
        "프롬프트 2-3",
        "프롬프트 2-4",
      ]
    },
    {
      name: "MASK",
      prompts: [
        "프롬프트 3-1",
        "프롬프트 3-2",
        "프롬프트 3-3",
        "프롬프트 3-4",
      ]
    },
    {
      name: "그룹 4",
      prompts: [
        "프롬프트 4-1",
        "프롬프트 4-2",
        "프롬프트 4-3",
        "프롬프트 4-4",
      ]
    },
  ];

  let selectedGroup = 0;

  let uploadedFile = null;
  let currentModel = 'gemini-2.5-flash-image';

  async function loadModels() {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey) { setStatus('먼저 API 키를 입력해주세요.', true); return; }

    const btn = document.getElementById('check-models-btn');
    btn.textContent = '불러오는 중...';
    btn.disabled = true;

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'API 오류');

      const allModels = (data.models || []).filter(m => {
        const id = m.name.replace('models/', '');
        return (m.supportedGenerationMethods || []).includes('generateContent') &&
               (id.includes('image') || id.includes('imagen'));
      });

      const listEl = document.getElementById('model-list');
      listEl.style.display = 'block';

      if (allModels.length === 0) {
        listEl.innerHTML = '<div style="color:#888;padding:8px 0">사용 가능한 이미지 생성 모델이 없습니다.</div>';
      } else {
        listEl.innerHTML = allModels.map(m => {
          const id = m.name.replace('models/', '');
          const displayName = m.displayName || '';
          return `<div class="model-item" onclick="selectModel('${id}')">
            <span class="model-id">${id}</span>
            ${displayName ? `<span style="font-size:11px;color:#888">(${displayName})</span>` : ''}
            <span class="select-tag" style="background:#e8f5e9;color:#2e7d32">이미지</span>
          </div>`;
        }).join('');
      }
    } catch(e) {
      setStatus('모델 목록 오류: ' + e.message, true);
    } finally {
      btn.textContent = '새로고침';
      btn.disabled = false;
    }
  }

  function selectModel(modelId) {
    currentModel = modelId;
    document.getElementById('current-model-name').textContent = modelId;
    document.getElementById('model-list').style.display = 'none';
    document.getElementById('check-models-btn').textContent = '사용 가능한 모델 목록 불러오기';
    setStatus(`모델 선택됨: ${modelId}`);
  }

  function renderGroups() {
    const container = document.getElementById('group-selector');
    container.innerHTML = PROMPT_GROUPS.map((g, i) => `
      <button class="group-btn ${i === selectedGroup ? 'active' : ''}" onclick="selectGroup(${i})">${g.name}</button>
    `).join('');
  }

  function selectGroup(index) {
    selectedGroup = index;
    renderGroups();
  }

  // Restore saved key
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('mj_api_key');
    if (saved) document.getElementById('api-key').value = saved;
    renderGroups();
    updateBtn();
  });

  function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    if (!key) return;
    localStorage.setItem('mj_api_key', key);
    setStatus('API 키가 저장되었습니다.', false);
    updateBtn();
  }

  function updateBtn() {
    const hasKey = document.getElementById('api-key').value.trim().length > 0;
    document.getElementById('generate-btn').disabled = !(hasKey && uploadedFile);
  }

  document.getElementById('api-key').addEventListener('input', updateBtn);

  // Drag & drop
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });

  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    uploadedFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('preview-img').src = ev.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
      dz.style.display = 'none';
      updateBtn();
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    uploadedFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('preview-wrap').style.display = 'none';
    dz.style.display = 'block';
    updateBtn();
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = isError ? 'error' : '';
  }

  async function callGemini(apiKey, prompt, base64, mimeType) {
    const body = {
      contents: [{
        parts: [
          { text: prompt },
          { inline_data: { mime_type: mimeType, data: base64 } }
        ]
      }],
      generationConfig: { responseModalities: ["IMAGE", "TEXT"] }
    };
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${apiKey}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const parts = data.candidates?.[0]?.content?.parts || [];
    const imgPart = parts.find(p =>
      p.inlineData?.mimeType?.startsWith('image/') ||
      p.inline_data?.mime_type?.startsWith('image/')
    );
    if (!imgPart) {
      const reason = data.candidates?.[0]?.finishReason || '';
      const textPart = parts.find(p => p.text);
      throw new Error(
        `이미지 없음` +
        (reason ? ` (${reason})` : '') +
        (textPart?.text ? `: ${textPart.text.slice(0, 100)}` : '')
      );
    }
    const inlineData = imgPart.inlineData || imgPart.inline_data;
    return `data:${inlineData.mimeType || inlineData.mime_type};base64,${inlineData.data}`;
  }

  async function generate() {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey || !uploadedFile) return;

    const btn = document.getElementById('generate-btn');
    btn.disabled = true;

    const PROMPTS = PROMPT_GROUPS[selectedGroup].prompts;

    // 결과 영역 초기화 — 각 슬롯에 로딩 표시
    const grid = document.getElementById('result-grid');
    grid.innerHTML = PROMPTS.map((p, i) => `
      <div class="result-item" id="slot-${i}">
        <div class="generating"><span class="spinner"></span> 생성 중...</div>
        <div class="prompt-label">${p.slice(0, 40)}${p.length > 40 ? '…' : ''}</div>
      </div>
    `).join('');
    document.getElementById('result-wrap').style.display = 'block';
    setStatus('<span class="spinner"></span> 이미지 4장 생성 중...');

    const base64 = await fileToBase64(uploadedFile);
    const mimeType = uploadedFile.type;

    let doneCount = 0;
    const results = await Promise.allSettled(
      PROMPTS.map((prompt, i) =>
        callGemini(apiKey, COMMON_PROMPT + '\n' + prompt, base64, mimeType).then(imgSrc => {
          // 완료된 슬롯 즉시 업데이트
          const slot = document.getElementById(`slot-${i}`);
          slot.innerHTML = `
            <img src="${imgSrc}" alt="결과 ${i+1}" />
            <div class="prompt-label">${prompt.slice(0, 40)}${prompt.length > 40 ? '…' : ''}</div>
            <button class="dl-btn" onclick="downloadImage('${imgSrc}', ${i+1})">다운로드</button>
          `;
          doneCount++;
          setStatus(`<span class="spinner"></span> ${doneCount} / ${PROMPTS.length} 완료...`);
          return imgSrc;
        }).catch(err => {
          const slot = document.getElementById(`slot-${i}`);
          slot.innerHTML = `
            <div class="gen-error">오류: ${err.message}</div>
            <div class="prompt-label">${prompt.slice(0, 40)}${prompt.length > 40 ? '…' : ''}</div>
          `;
          doneCount++;
          setStatus(`<span class="spinner"></span> ${doneCount} / ${PROMPTS.length} 완료...`);
          throw err;
        })
      )
    );

    const successCount = results.filter(r => r.status === 'fulfilled').length;
    setStatus(successCount === PROMPTS.length
      ? '✓ 4장 모두 생성 완료!'
      : `✓ ${successCount}장 완료 (${PROMPTS.length - successCount}장 실패)`
    , successCount === 0);

    btn.disabled = false;
    updateBtn();
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function downloadImage(src, index) {
    const a = document.createElement('a');
    a.href = src;
    a.download = `mjimage_${index}_${Date.now()}.png`;
    a.click();
  }
</script>
</body>
</html>
